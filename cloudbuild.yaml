steps:
  # Build the container image with HF_TOKEN
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'HF_TOKEN=$_HF_TOKEN'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dandori:$COMMIT_SHA'
      - '.'
    secretEnv: ['HF_TOKEN']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/dandori:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dandori'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dandori:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'HF_TOKEN=$_HF_TOKEN'
    secretEnv: ['HF_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/HF_TOKEN/versions/latest
      env: 'HF_TOKEN'

substitutions:
  _HF_TOKEN: ''

images:
  - 'gcr.io/$PROJECT_ID/dandori:$COMMIT_SHA'
